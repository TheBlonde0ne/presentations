<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=.4">
    <title>ARPES Measurement Sketch</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            position: relative;
            width: 400px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 400px;
            height: 250px;
        }
        .controls {
            position: absolute;
            bottom: 10px;
            left: 12px;
            pointer-events: none;
            color: #333;
        }
        .label {
            font-weight: bold;
            font-size: 11px;
        }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="arpesCanvas" width="800" height="500"></canvas>
    <div class="controls">
        <div class="label">ARPES Sketch: <span style="color:#e67e22;">Laser</span> &rarr; <span style="color:#3498db;">Photoelectron</span></div>
    </div>
</div>

    <script>
    const canvas = document.getElementById('arpesCanvas');
    const ctx = canvas.getContext('2d');

    const width = canvas.width;
    const height = canvas.height;
    const centerX = width / 2;
    const centerY = height - 115;

    function drawArrow(fromX, fromY, toX, toY, color, widthLine, dashed = false) {
        const angle = Math.atan2(toY - fromY, toX - fromX);
        const headLength = 14;

        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = widthLine;
        ctx.lineCap = 'round';
        if (dashed) {
            ctx.setLineDash([10, 8]);
        }

        ctx.beginPath();
        ctx.moveTo(fromX, fromY);
        ctx.lineTo(toX, toY);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(toX, toY);
        ctx.lineTo(toX - headLength * Math.cos(angle - Math.PI / 6), toY - headLength * Math.sin(angle - Math.PI / 6));
        ctx.lineTo(toX - headLength * Math.cos(angle + Math.PI / 6), toY - headLength * Math.sin(angle + Math.PI / 6));
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }

    function drawLabel(text, x, y, color, align = 'center') {
        ctx.save();
        ctx.font = 'bold 13px Segoe UI, Tahoma, sans-serif';
        ctx.fillStyle = color;
        ctx.textAlign = align;
        ctx.fillText(text, x, y);
        ctx.restore();
    }

    function drawSource(x, y) {
        ctx.save();
        const bodyGradient = ctx.createLinearGradient(x - 42, y - 24, x + 42, y + 24);
        bodyGradient.addColorStop(0, '#1f2d3a');
        bodyGradient.addColorStop(1, '#536779');
        ctx.fillStyle = bodyGradient;
        ctx.strokeStyle = '#16202b';
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.roundRect(x - 38, y - 18, 72, 36, 10);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ecf0f1';
        ctx.beginPath();
        ctx.arc(x + 20, y, 11, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.arc(x + 20, y, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#ecf0f1';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x - 28, y - 10);
        ctx.lineTo(x - 8, y - 10);
        ctx.moveTo(x - 28, y + 10);
        ctx.lineTo(x - 8, y + 10);
        ctx.stroke();

        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.arc(x - 18, y - 9, 2.5, 0, Math.PI * 2);
        ctx.arc(x - 8, y - 9, 2.5, 0, Math.PI * 2);
        ctx.arc(x - 18, y + 9, 2.5, 0, Math.PI * 2);
        ctx.arc(x - 8, y + 9, 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x + 32, y - 2);
        ctx.lineTo(x + 54, y - 2);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(x + 58, y - 2, 5, 0, Math.PI * 2);
        ctx.fillStyle = '#f39c12';
        ctx.fill();

        ctx.restore();
        drawLabel('LASER SOURCE', x, y - 32, '#2c3e50');
    }

    function drawAnalyzer(x, y) {
        ctx.save();
        ctx.strokeStyle = '#203040';
        ctx.lineWidth = 5;

        ctx.beginPath();
        ctx.arc(x, y, 54, Math.PI * 1.1, Math.PI * 2.2);
        ctx.stroke();

        ctx.lineWidth = 2;

        ctx.fillStyle = '#dfe6e9';
        ctx.beginPath();
        ctx.arc(x, y + 4, 24, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#203040';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x, y + 4, 24, Math.PI * 0.2, Math.PI * 1.1);
        ctx.stroke();

        ctx.restore();
        drawLabel('HEMISPHERICAL ANALYZER', x, y - 68, '#203040');
    }

    function drawStatic() {
        ctx.clearRect(0, 0, width, height);

        ctx.fillStyle = '#f9fbfc';
        ctx.fillRect(0, 0, width, height);

        const sourceX = 145;
        const sourceY = 122;
        const sampleTop = centerY;
        const analyzerX = 650;
        const analyzerY = 175;

        ctx.save();
        ctx.strokeStyle = '#c7d0d8';
        ctx.lineWidth = 2;
        ctx.setLineDash([7, 7]);
        ctx.beginPath();
        ctx.moveTo(centerX, sampleTop - 145);
        ctx.lineTo(centerX, sampleTop + 25);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        const surfaceGradient = ctx.createLinearGradient(centerX - 170, sampleTop - 35, centerX + 170, sampleTop + 35);
        surfaceGradient.addColorStop(0, '#8ea2b2');
        surfaceGradient.addColorStop(0.5, '#d4dde3');
        surfaceGradient.addColorStop(1, '#8ea2b2');
        ctx.fillStyle = surfaceGradient;
        ctx.fillRect(centerX - 170, sampleTop - 10, 340, 22);
        ctx.strokeStyle = '#6e7f8f';
        ctx.lineWidth = 2;
        ctx.strokeRect(centerX - 170, sampleTop - 10, 340, 22);

        for (let i = -150; i <= 150; i += 22) {
            ctx.beginPath();
            ctx.arc(centerX + i, sampleTop + 6, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = '#5f6f7d';
            ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.fillStyle = '#2c3e50';
        ctx.font = 'bold 14px Segoe UI, Tahoma, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('SAMPLE SURFACE', centerX, sampleTop + 42);
        ctx.restore();

        drawSource(sourceX, sourceY);
        drawAnalyzer(analyzerX, analyzerY);

        const photonStartX = sourceX + 35;
        const photonStartY = sourceY + 28;
        const photonHitX = centerX - 5;
        const photonHitY = sampleTop - 6;
        drawArrow(photonStartX, photonStartY, photonHitX, photonHitY, '#e67e22', 5);

        const secondaryStartX = centerX + 5;
        const secondaryStartY = sampleTop - 6;
        const electronEndX = analyzerX - 40;
        const electronEndY = analyzerY;
        drawArrow(secondaryStartX, secondaryStartY, electronEndX, electronEndY, '#2980b9', 5);

        const reflectedX = centerX + 150;
        const reflectedY = sampleTop - 95;
        drawArrow(photonHitX + 15, photonHitY - 1, reflectedX, reflectedY, '#880808', 3, true);

        drawLabel('laser light', (photonStartX + photonHitX) / 2 - 10, (photonStartY + photonHitY) / 2 - 20, '#e67e22', 'left');
        drawLabel('photoelectron', (secondaryStartX + electronEndX) / 2 - 30, (secondaryStartY + electronEndY) / 2 - 30, '#2980b9');
        drawLabel('scattered / reflected light', reflectedX + 10, reflectedY - 8, '#880808', 'left');

        ctx.save();
        ctx.fillStyle = '#34495e';
        ctx.font = 'bold 12px Segoe UI, Tahoma, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('θ_in', centerX - 78, sampleTop - 106);
        ctx.fillText('θ_out', centerX + 62, sampleTop - 106);
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = '#b8c3cc';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(centerX, sampleTop);
        ctx.lineTo(centerX, sampleTop - 130);
        ctx.stroke();
        ctx.restore();
    }

    drawStatic();
</script>

</body>
</html>
