<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        :root {
            color-scheme: bright;
        }

        body {
            margin: 0;
            background: #cab17e00;
        }

        .mo-container {
            display: flex;
            flex-direction: column;
            background: #cab17e00;
            color: #7fffe8;
            font-family: Arial, sans-serif;
            padding: 20px;
            border-radius: 12px;
            gap: 20px;
            justify-content: center;
            align-items: center;
            transform: scale(0.9);
            transform-origin: top center;
        }

        .plots-row {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        canvas {
            background: linear-gradient(180deg, #05080b 0%, #000 100%);
            border: 1px solid #25313a;
            border-radius: 8px;
        }

        .canvas-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .canvas-wrapper span {
            font-size: 13px;
            letter-spacing: 0.04em;
            color: #b6fff0;
        }
    </style>
</head>
<body>

<div class="mo-container">
    <div class="canvas-wrapper">
        <canvas id="canvas3d" width="640" height="230"></canvas>
    </div>
    <div class="plots-row">
        <div class="canvas-wrapper">
            <canvas id="canvas2dIncident" width="300" height="280"></canvas>
        </div>
        <div class="canvas-wrapper">
            <canvas id="canvas2dReflected" width="300" height="280"></canvas>
        </div>
    </div>
</div>

<script>
const c3d = document.getElementById('canvas3d');
const ctx3d = c3d.getContext('2d');
const c2dIncident = document.getElementById('canvas2dIncident');
const ctx2dIncident = c2dIncident.getContext('2d');
const c2dReflected = document.getElementById('canvas2dReflected');
const ctx2dReflected = c2dReflected.getContext('2d');

let time = 0;

function drawArrow(ctx, fromX, fromY, toX, toY, color, label, labelOffsetX = 0, labelOffsetY = 0) {
    const angle = Math.atan2(toY - fromY, toX - fromX);
    const headLength = 10;

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(fromX, fromY);
    ctx.lineTo(toX, toY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(toX, toY);
    ctx.lineTo(toX - headLength * Math.cos(angle - Math.PI / 7), toY - headLength * Math.sin(angle - Math.PI / 7));
    ctx.lineTo(toX - headLength * Math.cos(angle + Math.PI / 7), toY - headLength * Math.sin(angle + Math.PI / 7));
    ctx.closePath();
    ctx.fill();

    if (label) {
        ctx.font = '12px Arial, sans-serif';
        ctx.fillStyle = '#d8fff7';
        ctx.fillText(label, toX + labelOffsetX, toY + labelOffsetY);
    }
}

function project3d(x, y, z, originX, originY) {
    // Mirror the y dimension so positive y projects towards the viewer.
    return {
        x: originX + (x + y) * 0.78,
        y: originY + (x - y) * 0.34 - z * 0.88,
    };
}

function drawAxisLabel(ctx, x, y, text, align = 'center') {
    ctx.fillStyle = '#c9fff4';
    ctx.font = '12px Arial, sans-serif';
    ctx.textAlign = align;
    ctx.fillText(text, x, y);
    ctx.textAlign = 'center';
}

function drawDepthGuides(ctx, originX, originY, farY) {
    const xRails = [-85, -45, 0, 45, 85];
    const zRails = [-55, 0, 55];

    ctx.save();
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 7]);

    xRails.forEach((x, index) => {
        const start = project3d(x, -30, 0, originX, originY);
        const end = project3d(x, farY, 0, originX, originY);
        const alpha = index === 2 ? 0.3 : 0.16;
        ctx.strokeStyle = `rgba(127, 255, 232, ${alpha})`;
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
    });

    zRails.forEach((z, index) => {
        const start = project3d(0, -30, z, originX, originY);
        const end = project3d(0, farY, z, originX, originY);
        const alpha = index === 1 ? 0.24 : 0.12;
        ctx.strokeStyle = `rgba(255, 209, 102, ${alpha})`;
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
    });

    ctx.setLineDash([]);
    ctx.restore();
}

function drawInfoPanel(ctx, x, y, lines) {
    const lineHeight = 16;
    const width = 110;
    const height = 16 + lines.length * lineHeight;

    ctx.save();
    ctx.fillStyle = 'rgba(4, 10, 12, 0.72)';
    ctx.strokeStyle = 'rgba(127, 255, 232, 0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(x, y, width, height, 8);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#d8fff7';
    ctx.font = '12px Arial, sans-serif';
    ctx.textAlign = 'left';
    lines.forEach((line, index) => {
        ctx.fillText(line, x + 12, y + 22 + index * lineHeight);
    });
    ctx.restore();
}

function normalize3d(vector) {
    const length = Math.hypot(vector.x, vector.y, vector.z) || 1;
    return {
        x: vector.x / length,
        y: vector.y / length,
        z: vector.z / length,
    };
}

function add3d(a, b) {
    return { x: a.x + b.x, y: a.y + b.y, z: a.z + b.z };
}

function scale3d(vector, scalar) {
    return { x: vector.x * scalar, y: vector.y * scalar, z: vector.z * scalar };
}

function dot3d(a, b) {
    return a.x * b.x + a.y * b.y + a.z * b.z;
}

function cross3d(a, b) {
    return {
        x: a.y * b.z - a.z * b.y,
        y: a.z * b.x - a.x * b.z,
        z: a.x * b.y - a.y * b.x,
    };
}

function makePolarizationBasis(direction) {
    const normal = normalize3d(direction);
    const reference = Math.abs(normal.z) < 0.85 ? { x: 0, y: 0, z: 1 } : { x: 0, y: 1, z: 0 };
    const first = normalize3d(cross3d(reference, normal));
    const second = normalize3d(cross3d(normal, first));
    return { first, second };
}

function rotateBasis(first, second, angle) {
    const cosAngle = Math.cos(angle);
    const sinAngle = Math.sin(angle);
    return {
        first: add3d(scale3d(first, cosAngle), scale3d(second, sinAngle)),
        second: add3d(scale3d(second, cosAngle), scale3d(first, -sinAngle)),
    };
}

function drawPlane3d(ctx, originX, originY) {
    const planeCorners = [
        project3d(-120, -90, 0, originX, originY),
        project3d(120, -90, 0, originX, originY),
        project3d(150, 90, 0, originX, originY),
        project3d(-90, 90, 0, originX, originY),
    ];

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(planeCorners[0].x, planeCorners[0].y);
    for (let i = 1; i < planeCorners.length; i += 1) {
        ctx.lineTo(planeCorners[i].x, planeCorners[i].y);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(127, 255, 232, 0.06)';
    ctx.strokeStyle = 'rgba(127, 255, 232, 0.22)';
    ctx.lineWidth = 1.25;
    ctx.fill();
    ctx.stroke();

    const gridRows = [-60, -20, 20, 60];
    const gridColumns = [-80, -40, 0, 40, 80];
    ctx.strokeStyle = 'rgba(127, 255, 232, 0.08)';
    ctx.lineWidth = 1;

    gridRows.forEach((yValue) => {
        const start = project3d(-120, yValue, 0, originX, originY);
        const end = project3d(150, yValue, 0, originX, originY);
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
    });

    gridColumns.forEach((xValue) => {
        const start = project3d(xValue, -90, 0, originX, originY);
        const end = project3d(xValue, 90, 0, originX, originY);
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
    });

    ctx.restore();
}

function drawWaveRibbon3d(ctx, originX, originY, startPoint, direction, amplitude, ellipticity, rotationAngle, phaseOffset, length, color, lineWidth) {
    const unitDirection = normalize3d(direction);
    const basis = makePolarizationBasis(unitDirection);
    const rotatedBasis = rotateBasis(basis.first, basis.second, rotationAngle);
    const waveNumber = 0.22;
    const stepCount = 140;

    ctx.save();
    ctx.beginPath();
    ctx.lineWidth = lineWidth;
    ctx.strokeStyle = color;

    for (let i = 0; i <= stepCount; i += 1) {
        const progress = i / stepCount;
        const distance = length * progress;
        const wavePhase = distance * waveNumber - phaseOffset;
        const offset = add3d(
            scale3d(rotatedBasis.first, amplitude * Math.cos(wavePhase)),
            scale3d(rotatedBasis.second, amplitude * ellipticity * Math.sin(wavePhase))
        );
        const point = add3d(startPoint, add3d(scale3d(unitDirection, distance), offset));
        const projected = project3d(point.x, point.y, point.z, originX, originY);

        if (i === 0) {
            ctx.moveTo(projected.x, projected.y);
        } else {
            ctx.lineTo(projected.x, projected.y);
        }
    }

    ctx.stroke();
    ctx.restore();
}

function drawCenterLine3d(ctx, originX, originY, startPoint, direction, length, color, dashPattern = []) {
    const unitDirection = normalize3d(direction);
    const endPoint = add3d(startPoint, scale3d(unitDirection, length));
    const projectedStart = project3d(startPoint.x, startPoint.y, startPoint.z, originX, originY);
    const projectedEnd = project3d(endPoint.x, endPoint.y, endPoint.z, originX, originY);

    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.6;
    ctx.setLineDash(dashPattern);
    ctx.beginPath();
    ctx.moveTo(projectedStart.x, projectedStart.y);
    ctx.lineTo(projectedEnd.x, projectedEnd.y);
    ctx.stroke();
    ctx.restore();
}

function drawLine3d(ctx, originX, originY, startPoint, endPoint, color, width = 1.6, dashPattern = []) {
    const projectedStart = project3d(startPoint.x, startPoint.y, startPoint.z, originX, originY);
    const projectedEnd = project3d(endPoint.x, endPoint.y, endPoint.z, originX, originY);

    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.setLineDash(dashPattern);
    ctx.beginPath();
    ctx.moveTo(projectedStart.x, projectedStart.y);
    ctx.lineTo(projectedEnd.x, projectedEnd.y);
    ctx.stroke();
    ctx.restore();
}

function drawPolarizationPanel(ctx, centerX, centerY, phase, config) {
    const {
        radius,
        major,
        minor,
        rotation,
        title,
        titleColor,
        outerColor,
        fieldColor,
        axisColor,
        subtitle,
        showAxes,
    } = config;

    ctx.save();
    ctx.translate(centerX, centerY);

    ctx.fillStyle = 'rgba(4, 10, 12, 0.74)';
    ctx.strokeStyle = 'rgba(127, 255, 232, 0.18)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(-105, -105, 210, 210, 14);
    ctx.fill();
    ctx.stroke();

    ctx.strokeStyle = 'rgba(94, 106, 115, 0.55)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 6]);
    ctx.beginPath();
    ctx.moveTo(-82, 0);
    ctx.lineTo(82, 0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, 82);
    ctx.lineTo(0, -82);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = outerColor;
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    if (major === minor) {
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
    } else {
        ctx.ellipse(0, 0, major, minor, rotation, 0, Math.PI * 2);
    }
    ctx.stroke();

    const fieldX = Math.cos(phase) * radius;
    const fieldY = Math.sin(phase) * radius;
    const fieldXRot = fieldX * Math.cos(rotation) - fieldY * Math.sin(rotation);
    const fieldYRot = fieldX * Math.sin(rotation) + fieldY * Math.cos(rotation);
    drawArrow(ctx, 0, 0, fieldXRot, fieldYRot, fieldColor, '', 0, 0);

    if (showAxes) {
        const majorEndX = Math.cos(rotation) * major;
        const majorEndY = Math.sin(rotation) * major;
        const minorEndX = -Math.sin(rotation) * minor;
        const minorEndY = Math.cos(rotation) * minor;

        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = axisColor;
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(-majorEndX, -majorEndY);
        ctx.lineTo(majorEndX, majorEndY);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-minorEndX, -minorEndY);
        ctx.lineTo(minorEndX, minorEndY);
        ctx.stroke();
        ctx.setLineDash([]);

        drawArrow(ctx, 0, 0, majorEndX, majorEndY, axisColor, 'major', 6, -8);
        drawArrow(ctx, 0, 0, minorEndX, minorEndY, '#ff8fab', 'minor', 6, -8);

        ctx.beginPath();
        ctx.strokeStyle = '#ffd166';
        ctx.lineWidth = 1.4;
        ctx.arc(0, 0, 28, 0, rotation, false);
        ctx.stroke();
        ctx.fillStyle = '#ffd166';
        ctx.font = '11px Arial, sans-serif';
        ctx.fillText('Kerr rotation', 12, -34);
    }

    ctx.fillStyle = '#d8fff7';
    ctx.font = '13px Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = titleColor || '#d8fff7';
    ctx.fillText(title, 0, -120);
    ctx.font = '12px Arial, sans-serif';
    ctx.fillStyle = '#d8fff7';
    ctx.fillText(subtitle, 0, 123);

    ctx.restore();
}

function draw() {
    time += 0.05;

    const phase = time * 0.95;
    const kerrAngle = 0.32 + 0.08 * Math.sin(time * 0.12);
    const reflectedEllipticity = 1.45 + 0.1 * Math.sin(time * 0.18 + 0.8);
    const incidentAmplitude = 70;
    const reflectedAmplitude = 70;

    ctx2dIncident.clearRect(0, 0, 300, 300);
    ctx2dReflected.clearRect(0, 0, 300, 300);
    ctx3d.clearRect(0, 0, 720, 320);

    drawPolarizationPanel(ctx2dIncident, 150, 150, phase, {
        radius: incidentAmplitude,
        major: incidentAmplitude,
        minor: incidentAmplitude,
        rotation: 0,
        title: 'Incident wave',
        titleColor: '#7fffe8',
        outerColor: '#7fffe8',
        fieldColor: '#ffd166',
        axisColor: '#9fd0ff',
        subtitle: 'circular polarization',
        showAxes: false,
    });

    drawPolarizationPanel(ctx2dReflected, 150, 150, phase + 0.45, {
        radius: reflectedAmplitude,
        major: 75,
        minor: 75 / reflectedEllipticity,
        rotation: kerrAngle,
        title: 'Reflected wave',
        titleColor: '#ff8fab',
        outerColor: '#ff8fab',
        fieldColor: '#ffd166',
        axisColor: '#7fffe8',
        subtitle: `ellipticity = ${reflectedEllipticity.toFixed(2)}`,
        showAxes: true,
    });

    const originX = 345;
    const originY = 144;

    drawPlane3d(ctx3d, originX, originY);

    const axisXEnd = project3d(120, 0, 0, originX, originY);
    const axisYEnd = project3d(0, 120, 0, originX, originY);
    const axisZEnd = project3d(0, 0, 120, originX, originY);

    drawLine3d(ctx3d, originX, originY, { x: 0, y: 0, z: 0 }, { x: 120, y: 0, z: 0 }, '#64727c', 1.8);
    drawLine3d(ctx3d, originX, originY, { x: 0, y: 0, z: 0 }, { x: 0, y: 120, z: 0 }, '#64727c', 1.8);
    drawLine3d(ctx3d, originX, originY, { x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 120 }, '#64727c', 1.8);

    const incidentStart = { x: -68, y: -42, z: 134 };
    const incidentDirection = normalize3d({ x: 0.42, y: 0.14, z: -1 });
    const incidentTravel = incidentStart.z / Math.abs(incidentDirection.z);
    const impactPoint = add3d(incidentStart, scale3d(incidentDirection, incidentTravel));
    const reflectedStart = { x: impactPoint.x, y: impactPoint.y, z: 0 };
    const reflectedDirection = normalize3d({ x: incidentDirection.x, y: incidentDirection.y, z: -incidentDirection.z });

    drawCenterLine3d(ctx3d, originX, originY, incidentStart, incidentDirection, incidentTravel, '#ffd166', [7, 6]);
    drawCenterLine3d(ctx3d, originX, originY, reflectedStart, reflectedDirection, 155, '#ffd166', [7, 6]);

    const impactProjected = project3d(impactPoint.x, impactPoint.y, impactPoint.z, originX, originY);
    ctx3d.save();
    ctx3d.fillStyle = '#ffd166';
    ctx3d.beginPath();
    ctx3d.arc(impactProjected.x, impactProjected.y, 4.2, 0, Math.PI * 2);
    ctx3d.fill();
    ctx3d.strokeStyle = 'rgba(255, 209, 102, 0.6)';
    ctx3d.lineWidth = 1;
    ctx3d.setLineDash([3, 4]);
    ctx3d.beginPath();
    ctx3d.moveTo(impactProjected.x - 16, impactProjected.y);
    ctx3d.lineTo(impactProjected.x + 16, impactProjected.y);
    ctx3d.stroke();
    ctx3d.setLineDash([]);
    ctx3d.fillStyle = '#ffd166';
    ctx3d.font = '11px Arial, sans-serif';
    ctx3d.restore();

    drawWaveRibbon3d(ctx3d, originX, originY, incidentStart, incidentDirection, 14, 1, 0, phase, incidentTravel, '#7fffe8', 2.0);
    drawWaveRibbon3d(ctx3d, originX, originY, reflectedStart, reflectedDirection, 14, reflectedEllipticity, kerrAngle, phase + 0.8, 155, '#ff8fab', 2.3);

    drawLine3d(ctx3d, originX, originY, { x: 0, y: 0, z: 0 }, { x: 0, y: 0, z: 128 }, 'rgba(255, 209, 102, 0.55)', 1.4, [6, 6]);
    const normalEnd = project3d(0, 0, 128, originX, originY);
    ctx3d.save();
    ctx3d.fillStyle = '#ffd166';
    ctx3d.font = '12px Arial, sans-serif';
    ctx3d.fillText('surface normal', normalEnd.x + 8, normalEnd.y - 4);
    ctx3d.restore();

    drawAxisLabel(ctx3d, axisXEnd.x + 10, axisXEnd.y + 4, 'x', 'left');
    drawAxisLabel(ctx3d, axisYEnd.x + 10, axisYEnd.y + 4, 'y', 'left');
    drawAxisLabel(ctx3d, axisZEnd.x + 10, axisZEnd.y - 2, 'z', 'left');

    ctx3d.fillStyle = '#d8fff7';
    ctx3d.font = '13px Arial, sans-serif';
    ctx3d.textAlign = 'left';
    ctx3d.fillStyle = '#7fffe8';
    ctx3d.fillText('incident circular polarization', 16, 24);
    ctx3d.fillStyle = '#ff8fab';
    ctx3d.fillText('reflected Kerr-rotated elliptic wave', 16, 42);

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
